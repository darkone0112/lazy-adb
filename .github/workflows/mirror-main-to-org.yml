name: Mirror main to org repo
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start ssh-agent and load mirror key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LAZY_ADB_ORG_MIRROR }}

      - name: Add github.com to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add org mirror remote
        run: |
          git remote add org-mirror git@github.com:Newline-Interactive-EU/lazy-adb-wizard.git

      - name: Push only main
        run: |
          git push --force org-mirror main:main
